services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cohesiq
      POSTGRES_PASSWORD: cohesiq
      POSTGRES_DB: cohesiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cohesiq -d cohesiq"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      network: host
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://cohesiq:cohesiq@postgres:5432/cohesiq
      SECRET_KEY: change_this_in_production
      CLERK_ISSUER_URL: https://sharp-marten-52.clerk.accounts.dev
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend/cohesiq-v0
      network: host
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/cohesiq-v0/.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/cohesiq-v0:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command: pnpm dev

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
