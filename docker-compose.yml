services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cohesiq
      POSTGRES_PASSWORD: cohesiq
      POSTGRES_DB: cohesiq
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cohesiq -d cohesiq" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      network: host
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://cohesiq:cohesiq@postgres:5432/cohesiq
      SECRET_KEY: change_this_in_production
      CLERK_ISSUER_URL: https://sharp-marten-52.clerk.accounts.dev
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend/cohesiq-v0
      network: host
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/cohesiq-v0/.env
    depends_on:
      - backend
    volumes:
      - ./frontend/cohesiq-v0:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command: pnpm dev

  # Expose the frontend publicly via ngrok.
  # Requires NGROK_AUTHTOKEN in your environment or a .env file at repo root.
  # Public URL appears in logs: docker compose logs ngrok
  # Local ngrok dashboard: http://localhost:4040
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: http frontend:3000 --domain=subprime-ligament-sixfold.ngrok-free.dev --log=stdout
    env_file:
      - ./backend/.env
    ports:
      - "4040:4040"
    depends_on:
      - frontend
    profiles:
      - tunnel

  # ------------------------------------------------------------------ #
  # AI-usage stack (branch sakib/ai-score-max).                          #
  # All services below are OPT-IN via profiles — the default             #
  # `docker compose up` (postgres/backend/frontend) is unaffected.       #
  #   docker compose --profile ai up -d        # mcp + prometheus + grafana
  #   docker compose --profile local-llm up -d # ollama (heavy, optional)
  #   docker compose --profile automation up   # n8n (optional)
  # ------------------------------------------------------------------ #

  # Cohesiq MCP server — exposes the matching engine as MCP tools (HTTP).
  # Reuses the backend image/code; just runs a different entrypoint.
  mcp:
    build:
      context: ./backend
      network: host
    entrypoint: ["python", "-m", "mcp_server"]
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: "8001"
      DATABASE_URL: postgresql+asyncpg://cohesiq:cohesiq@postgres:5432/cohesiq
      SECRET_KEY: change_this_in_production
    env_file:
      - ./backend/.env
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    profiles:
      - ai
      - mcp

  # Prometheus — scrapes backend:8000/metrics.
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
    profiles:
      - ai
      - observability

  # Grafana — dashboards over Prometheus (datasource + dashboard auto-provisioned).
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-cohesiq}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    profiles:
      - ai
      - observability

  # Ollama — local open-weight LLM runtime (Hermes). OPTIONAL + heavy: the
  # model is multi-GB and is NOT pulled by default. Flip on with:
  #   docker compose --profile local-llm up -d ollama
  #   docker compose exec ollama ollama pull ${OLLAMA_MODEL:-hermes3}
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-hermes3}
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    profiles:
      - local-llm

  # n8n — workflow automation. OPTIONAL. Import the workflow from
  # ops/n8n/workflows/ after first boot.
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-cohesiq}
      N8N_HOST: localhost
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
      - ./ops/n8n/workflows:/workflows:ro
    ports:
      - "5678:5678"
    profiles:
      - automation

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
  prometheus_data:
  grafana_data:
  ollama_data:
  n8n_data:
